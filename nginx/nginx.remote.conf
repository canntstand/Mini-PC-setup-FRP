user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
}

stream {
    allow 10.0.0.0/8;
    allow 127.0.0.1;
    deny all;

    server {
        listen 443;
        proxy_pass 127.0.0.1:8443;
        proxy_protocol on;
    }
}

http {
    map $remote_addr $is_family_vpn {
        ~^10\.          1;
        127.0.0.1       1;
        default         0;
    }
    
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            proxy_pass http://127.0.0.1:8080; 
            proxy_set_header Host $host;
        }

        location / {
            if ($is_family_vpn = 0) {
                return 444; 
            }
            return 301 https://$host$request_uri;
        }
    }
}