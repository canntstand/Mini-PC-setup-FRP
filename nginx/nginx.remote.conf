user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
}

stream {
    allow 10.0.0.0/8;
    allow 127.0.0.1;
    deny all;

    server {
        listen 80;
        proxy_pass 127.0.0.1:8080;
        proxy_protocol on;
    }

    server {
        listen 443;
        proxy_pass 127.0.0.1:8443;
        proxy_protocol on;
    }
}